version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: oncorisk-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_pass_2026
      POSTGRES_DB: oncorisk_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
    driver: local
