version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: oncorisk-prod-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: prod_secure_pass_987654321
      POSTGRES_DB: oncorisk_db
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    expose:
      - "5432"

  backend:
    build:
      context: ../
      dockerfile: backend/Dockerfile
    container_name: oncorisk-prod-backend
    restart: always
    environment:
      - ENVIRONMENT=production
      - PROJECT_NAME=OncoRisk AI API
      - VERSION=1.0.0
      - API_V1_STR=/api/v1
      - SECRET_KEY=generate-a-secure-32-character-secret-key-prod
      - DATABASE_URL=postgresql://postgres:prod_secure_pass_987654321@db:5432/oncorisk_db
      - ADMIN_EMAIL=admin@oncorisk.ai
      - ADMIN_PASSWORD=AdminSecurePassword2026!
      - BACKEND_CORS_ORIGINS=http://localhost,http://127.0.0.1
    depends_on:
      - db
    expose:
      - "8000"

  frontend:
    build:
      context: ../
      dockerfile: frontend/Dockerfile
    container_name: oncorisk-prod-frontend
    restart: always
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: oncorisk-prod-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./configs/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata_prod:
    driver: local
